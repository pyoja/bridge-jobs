name: Bridge Jobs Crawler

on:
  schedule:
    - cron: '0 18 * * *' # 매일 UTC 18시 = 한국시간 새벽 3시
  workflow_dispatch: # Run workflow 버튼 (입력창 없음)

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run Albamon Crawler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python crawler/scraper.py
