name: Bridge Jobs Crawler

on:
  schedule:
    - cron: '0 18 * * *' # 매일 UTC 18시 (KST 기준 새벽 3시)
  workflow_dispatch:
    inputs:
      keyword:
        description: '스크래핑할 대상 키워드 입력'
        required: true
        default: '계약직 1개월'

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r crawler/requirements.txt
          playwright install chromium

      - name: Execute Crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SEARCH_KEYWORD: ${{ github.event.inputs.keyword || '단기 계약직' }}
        run: python crawler/scraper.py
